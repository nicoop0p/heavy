<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aftershocks</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(180deg, #1a0000 0%, #000000 100%);
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .center-screen {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 3rem;
      letter-spacing: 0.3rem;
      opacity: 1;
      transition: opacity 1.5s ease;
      cursor: pointer;
      z-index: 10;
    }

    .center-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .site {
      opacity: 0;
      transition: opacity 1.5s ease;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding-top: 40px;
      text-align: center;
    }

    .site.visible { opacity: 1; }

    .container {
      max-width: 700px;
      width: 100%;
      padding: 40px 20px;
    }

    .album-cover {
      width: 220px;
      height: 220px;
      object-fit: cover;
      margin: 0 auto 25px auto;
      box-shadow: 0 0 20px rgba(255,0,0,0.3);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      letter-spacing: 0.15rem;
    }

    .track {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: opacity 0.2s ease;
      text-transform: none;
    }

    .track:hover { opacity: 0.6; }

    .section-title {
      margin-top: 40px;
      margin-bottom: 10px;
      font-size: 1.1rem;
      opacity: 0.7;
      letter-spacing: 0.1rem;
    }

    .links a {
      display: block;
      margin: 8px 0;
      color: #fff;
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s ease;
    }

    .links a:hover { opacity: 1; }

    .merch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .merch-item {
      background: #120000;
      padding: 10px;
      transition: transform 0.2s ease, opacity 0.2s ease;
      cursor: pointer;
    }

    .merch-item:hover {
      transform: scale(1.05);
      opacity: 0.85;
    }

    .merch-item img {
      width: 100%;
      height: auto;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<div id="openScreen" class="center-screen">(Open)</div>

<div id="siteContent" class="site">
  <div class="container">

    <img src="Untitled design (5).png" alt="Aftershocks Album Cover" class="album-cover">

    <h1>Aftershocks: Recast</h1>

    <div class="section-title">Snippets</div>

    <div class="track" onmouseenter="playSnippet('t1')" onmouseleave="stopSnippet('t1')">
      01. Ghosting Problems
      <audio id="t1" src="snippets/ghosting_problems (mp3cut.net).mp3"></audio>
    </div>

    <div class="track" onmouseenter="playSnippet('t2')" onmouseleave="stopSnippet('t2')">
      02. loves gone
      <audio id="t2" src="snippets/loves gone.mp3"></audio>
    </div>

    <div class="track" onmouseenter="playSnippet('t3')" onmouseleave="stopSnippet('t3')">
      03. PLEASE COME BACK TO ME
      <audio id="t3" src="snippets/please come back to me.mp3"></audio>
    </div>

    <div class="track" onmouseenter="playSnippet('t4')" onmouseleave="stopSnippet('t4')">
      04. CHEATED
      <audio id="t4" src="snippets/cheated.mp3"></audio>
    </div>

    <div class="track" onmouseenter="playSnippet('t5')" onmouseleave="stopSnippet('t5')">
      05. DEEP/HOPE
      <audio id="t5" src="snippets/deep hope.mp3"></audio>
    </div>

    <div class="track" onmouseenter="playSnippet('t6')" onmouseleave="stopSnippet('t6')">
      06. IN LOVE
      <audio id="t6" src="snippets/in love.mp3"></audio>
    </div>

    <div class="track" onmouseenter="playSnippet('t7')" onmouseleave="stopSnippet('t7')">
      07. RECOVER
      <audio id="t7" src="snippets/recover.mp3"></audio>
    </div>

    <div class="track" onmouseenter="playSnippet('t8')" onmouseleave="stopSnippet('t8')">
      08. PERFECT
      <audio id="t8" src="snippets/perfect.mp3"></audio>
    </div>

    <div class="track" onmouseenter="playSnippet('t9')" onmouseleave="stopSnippet('t9')">
      09. FAULT
      <audio id="t9" src="snippets/fault.mp3"></audio>
    </div>

    <div class="section-title">Listen</div>
    <div class="links">
      <a href="#">Spotify</a>
      <a href="#">YouTube</a>
      <a href="#">Instagram</a>
    </div>

    <div class="section-title">Merch</div>
    <div class="merch-grid">
      <div class="merch-item" onclick="window.open('https://yourname.fourthwall.com', '_blank')">
        <img src="merch/shirt1.png" alt="Shirt">
        <div>Aftershocks Tee</div>
      </div>

      <div class="merch-item" onclick="window.open('https://yourname.fourthwall.com', '_blank')">
        <img src="merch/hoodie1.png" alt="Hoodie">
        <div>Aftershocks Hoodie</div>
      </div>

      <div class="merch-item" onclick="window.open('https://yourname.fourthwall.com', '_blank')">
        <img src="merch/cap1.png" alt="Cap">
        <div>Aftershocks Cap</div>
      </div>
    </div>

  </div>
</div>

<script>
  const openScreen = document.getElementById('openScreen');
  const siteContent = document.getElementById('siteContent');

  openScreen.addEventListener('click', () => {
    openScreen.classList.add('fade-out');
    setTimeout(() => {
      siteContent.classList.add('visible');
    }, 1400);
  });

  function playSnippet(id) {
    const audio = document.getElementById(id);
    audio.currentTime = 0;
    audio.volume = 0.7;
    audio.play();
  }

  function stopSnippet(id) {
    const audio = document.getElementById(id);
    audio.pause();
    audio.currentTime = 0;
  }
</script>

</body>
</html>
